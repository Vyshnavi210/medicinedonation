<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donated Medicines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Donated Medicines</h2>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Medicine</th>
                <th>Quantity</th>
                <th>Expiry Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="m : ${medicines}">

                <td th:text="${m.id}"></td>

                <td th:text="${m.medicineName}"></td>

                <td th:text="${m.quantity}"></td>

                <td th:text="${m.expiryDate}"></td>

                <td th:text="${m.status}"></td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
