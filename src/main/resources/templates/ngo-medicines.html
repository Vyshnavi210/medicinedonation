<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Medicines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">
        Available Donated Medicines
    </h2>

    <table class="table table-bordered table-striped">

        <thead class="table-success">

        <tr>
            <th>ID</th>
            <th>Medicine</th>
            <th>Quantity</th>
            <th>Expiry Date</th>
            <th>Description</th>
            <th>Status</th>
            <th>Claimed By</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="m : ${medicines}">

            <td th:text="${m.id}"></td>

            <td th:text="${m.medicineName}"></td>

            <td th:text="${m.quantity}"></td>

            <td th:text="${m.expiryDate}"></td>

            <td th:text="${m.description}"></td>

            <td th:text="${m.status}"></td>

            <td th:text="${m.claimedByNgo}"></td>

            <td>

                <a th:if="${m.status == 'APPROVED'}"
                   th:href="@{/ngo/claim(id=${m.id})}"
                   class="btn btn-primary btn-sm">
                    Claim
                </a>

                <span th:if="${m.status == 'CLAIMED'}">
                    Already Claimed
                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
