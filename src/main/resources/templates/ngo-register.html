<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NGO Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white text-center">
                    <h3>NGO Registration</h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/ngo/register}"
                          th:object="${ngo}"
                          method="post">

                        <div class="mb-3">
                            <label>NGO Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{ngoName}">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}">
                        </div>

                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}">
                        </div>

                        <button class="btn btn-success w-100">
                            Register NGO
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
