<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4 text-center">
        Admin Dashboard
    </h1>

    <h2>Members</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="m : ${members}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.email}"></td>
        </tr>
        </tbody>

    </table>

    <br>

    <h2>NGOs</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-success">
        <tr>
            <th>ID</th>
            <th>NGO Name</th>
            <th>Email</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="n : ${ngos}">
            <td th:text="${n.id}"></td>
            <td th:text="${n.ngoName}"></td>
            <td th:text="${n.email}"></td>
        </tr>
        </tbody>

    </table>

    <br>

    <h2>Medicine Donations</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-warning">
        <tr>
            <th>ID</th>
            <th>Medicine</th>
            <th>Donated By (Member ID)</th>
            <th>Claimed By NGO</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="med : ${medicines}">

            <td th:text="${med.id}"></td>

            <td th:text="${med.medicineName}"></td>

            <td th:text="${med.memberId}"></td>

            <td th:text="${med.claimedByNgo}"></td>

            <td th:text="${med.status}"></td>

            <td>

                <a th:if="${med.status == 'PENDING'}"
                   th:href="@{/admin/approve(id=${med.id})}"
                   class="btn btn-success btn-sm">
                    Approve
                </a>

                <span th:if="${med.status == 'APPROVED'}"
                      class="badge bg-success">
                    Approved
                </span>

                <span th:if="${med.status == 'CLAIMED'}"
                      class="badge bg-primary">
                    Claimed
                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
